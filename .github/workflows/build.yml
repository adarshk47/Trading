name: Build ScalpAI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show project structure
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== ScalpAI project dir ==="
          ls -la ScalpAI-AndroidApp/ScalpAI/
          echo "=== app dir ==="
          ls -la ScalpAI-AndroidApp/ScalpAI/app/ || true

      - name: Generate Gradle wrapper
        working-directory: ScalpAI-AndroidApp/ScalpAI
        run: gradle wrapper --gradle-version 8.4 --distribution-type bin

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_HOME/cmdline-tools/*/bin/sdkmanager --licenses || true

      - name: Build Debug APK
        working-directory: ScalpAI-AndroidApp/ScalpAI
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: List APK files
        run: find . -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScalpAI-Debug-APK
          path: ScalpAI-AndroidApp/ScalpAI/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
